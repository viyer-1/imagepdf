name: Build Multi-Platform Executables

on:
  workflow_dispatch:  # Manual trigger
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        default: 'auto'
  push:
    branches:
      - main
      - release/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  # Windows Build
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run pre-build tests
        run: pytest tests/ -v

      - name: Build Windows executable
        run: |
          build_scripts\windows\build_windows.bat

      - name: Get version from config
        id: version
        shell: bash
        run: |
          VERSION=$(python build_scripts/read_config.py version.full)
          APP_NAME_EXEC=$(python build_scripts/read_config.py branding.app_name_executable)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name_exec=$APP_NAME_EXEC" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Smoke test Windows binary
        shell: pwsh
        run: |
          $AppExec = "${{ steps.version.outputs.app_name_exec }}"
          $BinaryPath = "dist\$AppExec\$AppExec.exe"
          Write-Host "Running smoke test: $BinaryPath"
          $env:QT_QPA_PLATFORM = "offscreen"
          $p = Start-Process -FilePath $BinaryPath -ArgumentList "--smoke-test" -Wait -PassThru
          Write-Host "Smoke test exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) {
            Write-Error "Binary smoke test FAILED (exit code $($p.ExitCode))"
            exit 1
          }
          Write-Host "Binary smoke test PASSED"

      - name: Create installer with Inno Setup
        run: |
          choco install innosetup -y
          cd build_scripts/windows
          iscc installer.iss

      - name: Upload to GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/windows/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-log-windows
          path: ${{ runner.temp }}/smoke_test.log
          if-no-files-found: warn

  # macOS Build
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest
          brew install create-dmg

      - name: Run pre-build tests
        run: pytest tests/ -v

      - name: Build macOS app
        run: |
          chmod +x build_scripts/macos/build_macos.sh
          ./build_scripts/macos/build_macos.sh

      - name: Get version from config
        id: version
        run: |
          VERSION=$(python build_scripts/read_config.py version.full)
          APP_NAME=$(python build_scripts/read_config.py branding.app_name)
          APP_NAME_EXEC=$(python build_scripts/read_config.py branding.app_name_executable)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "app_name_exec=$APP_NAME_EXEC" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Smoke test macOS binary
        run: |
          APP_NAME="${{ steps.version.outputs.app_name }}"
          APP_NAME_EXEC="${{ steps.version.outputs.app_name_exec }}"
          BINARY="dist/${APP_NAME}.app/Contents/MacOS/${APP_NAME_EXEC}"
          echo "Running smoke test: $BINARY"
          # Remove quarantine attribute so Gatekeeper doesn't block locally-built binary
          xattr -cr "dist/${APP_NAME}.app" 2>/dev/null || true
          # macOS has no GNU timeout; the smoke test exits in seconds on success,
          # and the GitHub Actions job-level timeout handles any unexpected hang
          QT_QPA_PLATFORM=offscreen "$BINARY" --smoke-test
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Binary smoke test FAILED (exit code $EXIT_CODE)"
            exit 1
          fi
          echo "Binary smoke test PASSED"

      - name: Upload to GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/macos/*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-log-macos
          path: ${{ runner.temp }}/smoke_test.log
          if-no-files-found: warn

  # Linux x86_64 Build
  build-linux-x86:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            wget \
            fuse \
            libfuse2 \
            desktop-file-utils \
            libgl1 \
            libxcb-xinerama0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Run pre-build tests
        run: pytest tests/ -v

      - name: Build Linux x86_64 executable
        run: |
          chmod +x build_scripts/linux_x86/build_linux_x86.sh
          ./build_scripts/linux_x86/build_linux_x86.sh

      - name: Get version from config
        id: version
        run: |
          VERSION=$(python build_scripts/read_config.py version.full)
          APP_NAME_EXEC=$(python build_scripts/read_config.py branding.app_name_executable)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name_exec=$APP_NAME_EXEC" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Smoke test Linux x86_64 binary
        run: |
          APP_NAME_EXEC="${{ steps.version.outputs.app_name_exec }}"
          # Test the PyInstaller-produced binary directly (no FUSE required)
          BINARY="dist/${APP_NAME_EXEC}/${APP_NAME_EXEC}"
          echo "Running smoke test: $BINARY"
          chmod +x "$BINARY"
          QT_QPA_PLATFORM=offscreen timeout 30 "$BINARY" --smoke-test
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Binary smoke test FAILED (exit code $EXIT_CODE)"
            exit 1
          fi
          echo "Binary smoke test PASSED"

      - name: Upload to GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/linux_x86/*.AppImage
            dist/linux_x86/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-log-linux-x86
          path: ${{ runner.temp }}/smoke_test.log
          if-no-files-found: warn

  # Linux ARM (Raspberry Pi / aarch64) Build
  build-linux-arm:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            wget \
            fuse \
            libfuse2 \
            desktop-file-utils \
            libgl1 \
            libxcb-xinerama0 \
            libxkbcommon0 \
            libdbus-1-3 \
            libegl1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # PyQt6 6.10.2 (requirements.txt) has no aarch64 wheel.
          # 6.7.1 is the latest with manylinux_2_28_aarch64, compatible with
          # Raspberry Pi OS Bookworm (glibc 2.36) and later ARM distros.
          sed '/^PyQt6/d' requirements.txt > /tmp/req_noqt.txt
          pip install -r /tmp/req_noqt.txt "PyQt6==6.7.1"
          pip install pyinstaller pytest

      - name: Run pre-build tests
        run: pytest tests/ -v

      - name: Build Linux ARM executable
        run: |
          chmod +x build_scripts/linux_arm/build_linux_arm.sh
          # Patch requirements.txt so the build script's internal pip install
          # also picks up 6.7.1 (the latest PyQt6 with a manylinux_2_28_aarch64 wheel)
          # instead of 6.10.2 which has no pre-built aarch64 wheel.
          sed -i 's/^PyQt6==.*/PyQt6==6.7.1/' requirements.txt
          # VIRTUAL_ENV bypasses the interactive venv prompt in the build script.
          # SKIP_APPIMAGE=1: appimagetool fails in CI when PyQt6 bundles multi-arch
          # libs; tar.gz is a fully valid ARM distribution format.
          VIRTUAL_ENV=$(python3 -c "import sys; print(sys.prefix)") \
            SKIP_APPIMAGE=1 \
            ./build_scripts/linux_arm/build_linux_arm.sh

      - name: Get version from config
        id: version
        run: |
          VERSION=$(python build_scripts/read_config.py version.full)
          APP_NAME_EXEC=$(python build_scripts/read_config.py branding.app_name_executable)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "app_name_exec=$APP_NAME_EXEC" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Smoke test Linux ARM binary
        run: |
          APP_NAME_EXEC="${{ steps.version.outputs.app_name_exec }}"
          # Test the PyInstaller-produced binary directly (no FUSE required)
          BINARY="dist/${APP_NAME_EXEC}/${APP_NAME_EXEC}"
          echo "Running smoke test: $BINARY"
          chmod +x "$BINARY"
          QT_QPA_PLATFORM=offscreen timeout 30 "$BINARY" --smoke-test
          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "Binary smoke test FAILED (exit code $EXIT_CODE)"
            exit 1
          fi
          echo "Binary smoke test PASSED"

      - name: Upload to GitHub Release (on tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/linux_arm/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload smoke test log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-log-linux-arm
          path: ${{ runner.temp }}/smoke_test.log
          if-no-files-found: warn
